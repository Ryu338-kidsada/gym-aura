services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: gymaura
      POSTGRES_USER: gymaura
      POSTGRES_PASSWORD: gymaura
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gymaura -d gymaura"]
      interval: 5s
      timeout: 5s
      retries: 10
  api:
    build: ./server
    environment:
      DATABASE_URL: postgres://gymaura:gymaura@db:5432/gymaura
      JWT_SECRET: ${JWT_SECRET:-replace-this-secret-before-production}
      CLIENT_ORIGIN: http://localhost:8080
    depends_on:
      db:
        condition: service_healthy
  web:
    build: .
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  postgres_data:
